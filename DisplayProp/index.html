<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          .ex1 p{font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                 color: red;
                 font-size: 22px;}

          #abc{display: none;}
          #ok{display: block;
              background-color: aqua;}
          #hi{display: inline; 
              background-color: blue;}    




    </style>
</head>
<body>
    <div class="ex1">
        <h1>display: none</h1>
        <p id="abc">hello guys</p>
    </div>
    
     <div class="ex1">
        <h1>display: block</h1>
        <p id="ok">hello guys</p>
    </div>

     <div class="ex1">
        <h1>display: inline</h1>
        <p id="hi">hello guys</p>
    </div>
</body>
</html>
