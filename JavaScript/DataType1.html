<!DOCTYPE html>
<html lang="en">

<body>
    




    <script>

//data type- types of data
//1. string- "anything under double quotes " " or single quote ' ' are string"

        var username= "manish"
        console.log(username)

// To know data type

        console.log(typeof(username))

// 2. Number - any humber or decimal number without any quotes

        var age= 22
        console.log(typeof(age))

        var num= 12.5
        console.log(typeof(num))

//boolean - true or false value
        
        var islogined= true

        var issubscribed= false

        console.log(typeof(islogined))

// undefined - when value is not assigned
        
        var a
        console.log(typeof(a))
        // we will get undefined


// null - nothing  
        var b= null
        console.log(typeof(b))   
        
        //the data type we will get here will be object which is a early bug of JS

        



    </script>
</body>
