<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{background-color: red;
            color: white;
            height: 100px;
            width: 100px;
            text-align: center;
            
          }

          /* hover- when u move ur mouse pointer to something and it changes size */
          
          #gg:hover{ transform: scale(1.04);
            background-color: black;
            transition: 2s;
            
            

          }

    </style>
</head>
<body>
     <div id="gg" class="box">box</div>
</body>
</html>
