<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          body{ background-color: antiquewhite;
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                display: flex;
                justify-content: center;

          }
          .product{ background-color:white;
            width: 250px;
            border: 1px solid black;
            margin: 12px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 5px 5px 12px black;
        

          }
          .product img{
            object-fit: cover;
            width: 100%; 
            height: 300px;
            border-radius: 12px;
         }

         .product button{ 
            background-color:orange;
            border: none;
            padding: 12px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: white;
            border-radius: 12px;
            cursor: pointer;
        }
        .product button:hover{transform: 1.02;
                              background-color: red;
                              transition: 1s;}


    </style>
</head>
<body>
     
    <div class="product">
        <img src="https://media.istockphoto.com/id/812006616/photo/mens-shoe-isolated-on-gray.jpg?b=1&s=612x612&w=0&k=20&c=WL7nIwvbYtFP6zu9E2lnQEnGCPmC1YE31jhUusS92ZY=" height="100" width="100">
        <h2>shoes</h2>
        <p><del>50$</del> 40$</p>
        <button>add to cart</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/13911541/pexels-photo-13911541.jpeg" height="100"width100>
        <h2>iphone</h2>
        <p><del>400$</del> 350$</p>
        <button>add to cart</button>
    </div>


    <div class="product">
        <img src="https://images.pexels.com/photos/30053852/pexels-photo-30053852.jpeg" height="100" width="100">
        <h2>camera</h2>
        <p>200$</p>
        <button>add to cart</button>
    </div>
    


</body>
</html>
